<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="mem1-button">Reason #1</button>
    <button id="mem2-button">Reason #2</button>
    <button id="mem3-button">Reason #3</button>
    <h1>Why <span class="secretCabbage">Lettuce</span> Is Great <br>
      (A <span id="human">Hamsters</span> Perspective)</h1>
    
        <h3 id="mem1">Reason #1</h3>
        <img id="imgMem1" src="LETTUCE 1.jpg" alt="LETTUCE">

        <h3 id="mem2">Reason #2</h3>
        <img id="imgMem2" src="LETTUCE 2.jpg" alt="LETTUCE">

        <h3 id="mem3">Reason #3</h3>
        <img id="imgMem3" src="LETTUCE 3.jpg" alt="LETTUCE">

        <br><button id="secretCabbage2">PRESS</button>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      $("#secretCabbage2").hide();

      // ======================== Button #1
      $("#mem1").hide();
      $("#imgMem1").hide();
      $("#mem1-button").click(function () {
      $("#mem1").fadeIn(5000);
      $("#imgMem1").show(5000);
      });

      // ======================== Button #2
      $("#mem2").hide();
      $("#imgMem2").hide();
      $("#mem2-button").click(function () {
      $("#mem2").fadeIn(5000);
      $("#imgMem2").show(5000);
      });

      // ======================== Button #3
      $("#mem3").hide();
      $("#imgMem3").hide();
      $("#mem3-button").click(function () {
      $("#mem3").fadeIn(5000);
      $("#imgMem3").show(5000);
      $("#secretCabbage2").show(5000);
      });

      // ======================== SECRET CABBAGE
      $("#secretCabbage2").click(function () {
      
      $(".secretCabbage").text("CABBAGE");
      $("#human").text("MERCHANT'S");
      $('#imgMem1').attr('src','CABBAGE MERCHANT.jpg');
      $('#imgMem2').attr('src','CABBAGE MERCHANT 1.jpg');
      $('#imgMem3').attr('src','CABBAGE MERCHANT 2.jpg');
      $("h3").text("MY CABBAGES");
      });
    </script>
  </body>
</html>
